<!doctype html>
<html>
  <head>
    <title>LA TV Shows | Home</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">MLB Players</h1>
    </header>
   <div class="filters">                                                                                                                                                                                                    
      <select id="team-filter" onchange="filterByTeam()">                                                                                                                                                                    
       <option value="All">All Teams</option>
       <option value="New York Yankees">New York Yankees</option>                                                                                                                                                           
        <option value="Los Angeles Dodgers">Los Angeles Dodgers</option>                                                                                                                                                     
       <option value="Kansas City Royals">Kansas City Royals</option>                                                                                                                                                       
     </select>                                                                                                                                                                                                              
    </div>     
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <img src="" alt="Player headshot" />
        <h2>Player Name</h2>
        <p class="team">Team</p>
        <p class="position">Position</p>
        <div class="stats">
          <span class="hr">HR: 0</span>
          <span class="avg">AVG: .000</span>
          <span class="rbi">RBI: 0</span>
          <span class="sb">SB: 0</span>
        </div>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
      <button id="sort-btn" onclick="sortByHomeRuns()">Sort by HR: Least</button>
    </div>
  </body>
</html>
